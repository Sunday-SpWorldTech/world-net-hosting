<!DOCTYPE html><html lang="en"><head>
  <link rel="preconnect" href="https://world-net-hosting-backend.onrender.com" crossorigin><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Withdraw | WNH Banking</title><style>
:root{--text:#10253e;--muted:#5f738d;--line:rgba(35,77,122,.12);--primary:#1f7cff;--success:#19b36b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:#f5f9ff}main{max-width:1000px;margin:auto;padding:28px 18px 60px}.head,.card{background:white;border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(28,66,112,.11)}.head{padding:22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:16px}.head h1{margin:0}.head p{margin:6px 0 0;color:var(--muted)}.back{color:white;background:linear-gradient(135deg,var(--success),var(--primary));padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800}.card{padding:26px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.full{grid-column:1/-1}label{display:block;font-weight:750;font-size:.82rem;margin-bottom:7px}input,select,textarea{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;padding:0 13px;font:inherit;background:#f8fbff}textarea{padding:12px;min-height:90px}button{border:0;color:white;background:linear-gradient(135deg,var(--success),var(--primary));padding:13px 20px;border-radius:12px;font-weight:850;cursor:pointer}button:disabled{opacity:.55}.status{margin-top:14px;color:var(--muted);font-weight:700}.notice{padding:14px;border-radius:12px;background:#eef7ff;margin-bottom:18px}.fee{padding:12px;border-radius:12px;background:linear-gradient(135deg,rgba(25,179,107,.1),rgba(31,124,255,.1));font-weight:750}@media(max-width:650px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.head{align-items:flex-start;flex-direction:column}}</style><script src="assets/js/env.js"></script></head><body><main><header class="head"><div><h1>Withdraw</h1><p>Send wallet funds directly to a verified bank account through Paystack.</p></div><a class="back" href="dashboard-wallet.html">← Banking</a></header><section class="card"><div id="roleNotice" class="notice">Loading secure Banking account…</div><form id="form"><div class="grid"><div><label>Amount</label><input name="amount" type="number" min="100" step="0.01" required></div><div><label>Currency</label><select name="currency" id="currency"><option>NGN</option><option>GHS</option><option>KES</option><option>ZAR</option></select></div><div><label>Bank</label><select name="bankCode" id="bank" required><option value="">Loading banks…</option></select></div><div><label>Account number</label><input name="accountNumber" id="accountNumber" inputmode="numeric" required></div><div class="full"><label>Verified account name</label><input name="accountName" id="accountName" readonly required></div><div class="full"><label>Optional reason</label><textarea name="note"></textarea></div><div class="full fee" id="feeLine">A 4% platform fee is added to user and staff withdrawals. Admin system-wallet transfers have no platform fee.</div><div class="full"><button type="submit">Withdraw to Bank</button></div></div></form><div id="status" class="status"></div></section></main><script>
const API=String(window.WORLDNET_CONFIG?.API_BASE_URL||window.WORLDNET_API_BASE||'https://world-net-hosting-backend.onrender.com/api').replace(/\/$/,'');const token=localStorage.getItem('worldnet_token')||localStorage.getItem('worldnet_admin_token');const status=document.getElementById('status');const H={'Content-Type':'application/json',Authorization:`Bearer ${token||''}`};async function api(path,opt={}){let r,lastError;for(let attempt=0;attempt<3;attempt++){try{r=await fetch(API+path,{cache:'no-store',...opt});break}catch(e){lastError=e;if(attempt<2)await new Promise(resolve=>setTimeout(resolve,900*(attempt+1)));}}if(!r){throw new Error('Banking could not reach the backend. Confirm the backend is online and sign in again.')}const d=await r.json().catch(()=>({}));if(r.status===401){localStorage.removeItem('worldnet_token');localStorage.removeItem('worldnet_admin_token');sessionStorage.setItem('worldnet_return_to',location.pathname.split('/').pop());location.href='signin.html';throw new Error('Session expired. Sign in again.')}if(!r.ok)throw new Error(d.message||`Request failed (${r.status})`);return d}async function banks(){const c=document.getElementById('currency').value,b=document.getElementById('bank');b.innerHTML='<option value="">Loading banks…</option>';try{const list=await api(`/wallet/banking/banks?currency=${encodeURIComponent(c)}`,{headers:{Authorization:H.Authorization}});b.innerHTML='<option value="">Select bank</option>'+list.map(x=>`<option value="${x.code}">${x.name}</option>`).join('')}catch(e){b.innerHTML='<option value="">Banks unavailable</option>';status.textContent=e.message}}async function resolve(){const bankCode=document.getElementById('bank').value,accountNumber=document.getElementById('accountNumber').value;if(!bankCode||accountNumber.length<6)return;status.textContent='Verifying account…';try{const d=await api(`/wallet/banking/resolve-account?accountNumber=${encodeURIComponent(accountNumber)}&bankCode=${encodeURIComponent(bankCode)}`,{headers:{Authorization:H.Authorization}});document.getElementById('accountName').value=d.account_name||'';status.textContent='Account verified.'}catch(e){document.getElementById('accountName').value='';status.textContent=e.message}}async function init(){if(!token){location.href='signin.html';return}try{const w=await api('/wallet',{headers:{Authorization:H.Authorization}});document.getElementById('roleNotice').textContent=`${w.user?.role||'user'} wallet · Available: ${new Intl.NumberFormat(undefined,{style:'currency',currency:w.currency||'NGN'}).format(Number(w.balance||0))}`;if(w.user?.role==='admin')document.getElementById('feeLine').textContent='Admin system-wallet withdrawals are sent directly through Paystack with no 4% platform fee.'}catch(e){status.textContent=e.message}await banks()}document.getElementById('currency').onchange=banks;document.getElementById('bank').onchange=resolve;document.getElementById('accountNumber').onblur=resolve;document.getElementById('form').onsubmit=async e=>{e.preventDefault();const btn=e.target.querySelector('button');btn.disabled=true;status.textContent='Sending withdrawal securely through Paystack…';try{const b=Object.fromEntries(new FormData(e.target));b.amount=Number(b.amount);const isAdmin=(JSON.parse(localStorage.getItem('worldnet_user')||'{}').role==='admin')||Boolean(localStorage.getItem('worldnet_admin_token'));const path=isAdmin?'/admin/system-wallet/withdrawals':'/wallet/withdrawals';const d=await api(path,{method:'POST',headers:H,body:JSON.stringify(b)});status.textContent=d.message;e.target.reset();document.getElementById('accountName').value='';await banks();await init()}catch(x){status.textContent=x.message}finally{btn.disabled=false}};init();
</script>
  <script defer src="assets/js/app.js"></script>
  <script defer src="assets/js/language-switcher.js"></script>
</body></html>
