<!DOCTYPE html><html lang="en"><head>
  <link rel="preconnect" href="https://world-net-hosting-backend.onrender.com" crossorigin><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Receive | WNH Banking</title><script src="https://js.paystack.co/v2/inline.js"></script><style>
:root{--text:#10253e;--muted:#5f738d;--line:rgba(35,77,122,.12);--primary:#1f7cff;--success:#19b36b}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:#f5f9ff}main{max-width:1000px;margin:auto;padding:28px 18px 60px}.head,.card{background:white;border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 45px rgba(28,66,112,.11)}.head{padding:22px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:16px}.head h1{margin:0}.head p{margin:6px 0 0;color:var(--muted)}.back{color:white;background:linear-gradient(135deg,var(--success),var(--primary));padding:12px 16px;border-radius:12px;text-decoration:none;font-weight:800}.card{padding:26px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.full{grid-column:1/-1}label{display:block;font-weight:750;font-size:.82rem;margin-bottom:7px}input,select,textarea{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;padding:0 13px;font:inherit;background:#f8fbff}textarea{padding:12px;min-height:90px}button{border:0;color:white;background:linear-gradient(135deg,var(--success),var(--primary));padding:13px 20px;border-radius:12px;font-weight:850;cursor:pointer}button:disabled{opacity:.55}.status{margin-top:14px;color:var(--muted);font-weight:700}.notice{padding:14px;border-radius:12px;background:#eef7ff;margin-bottom:18px}@media(max-width:650px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.head{align-items:flex-start;flex-direction:column}}</style><script src="assets/js/env.js"></script></head><body><main><header class="head"><div><h1>Receive</h1><p>Create or view your secure Paystack dedicated receiving account.</p></div><a class="back" href="dashboard-wallet.html">← Banking</a></header><section class="card"><div id="roleNotice" class="notice">Loading secure Banking account…</div><div id="accountBox" class="notice">No receiving account loaded.</div><button id="create">Create Receive Account</button><div id="status" class="status"></div></section></main><script>
const API=String(window.WORLDNET_CONFIG?.API_BASE_URL||window.WORLDNET_API_BASE||'https://world-net-hosting-backend.onrender.com/api').replace(/\/$/,'');const token=localStorage.getItem('worldnet_token');const status=document.getElementById('status');function headers(json=true){const h={Authorization:`Bearer ${token||''}`};if(json)h['Content-Type']='application/json';return h}async function api(path,opt={}){let r,lastError;for(let attempt=0;attempt<3;attempt++){try{r=await fetch(API+path,{cache:'no-store',...opt});break}catch(e){lastError=e;if(attempt<2)await new Promise(resolve=>setTimeout(resolve,900*(attempt+1)));}}if(!r){throw new Error('Banking could not reach the backend. Confirm the backend is online and sign in again.')}const d=await r.json().catch(()=>({}));if(r.status===401){localStorage.removeItem('worldnet_token');localStorage.removeItem('worldnet_admin_token');sessionStorage.setItem('worldnet_return_to',location.pathname.split('/').pop());location.href='signin.html';throw new Error('Session expired. Sign in again.')}if(!r.ok)throw new Error(d.message||`Request failed (${r.status})`);return d}async function init(){if(!token){location.href='signin.html';return}try{const w=await api('/wallet',{headers:headers(false)});document.getElementById('roleNotice').textContent=`${w.user?.role||'user'} wallet · Available: ${new Intl.NumberFormat(undefined,{style:'currency',currency:w.currency||'NGN'}).format(Number(w.balance||0))}`;if(w.user?.role==='admin'&&'receive'!=='deposit'){status.textContent='This customer wallet action is restricted for the administrator role.';document.querySelector('form')?.querySelectorAll('input,select,textarea,button').forEach(x=>x.disabled=true)}}catch(e){status.textContent=e.message}}init();async function load(){try{const d=await api('/wallet/banking/summary',{headers:headers(false)});const a=d.dedicatedAccount||{};accountBox.innerHTML=a.active?`<b>${a.bankName||'Paystack Bank'}</b><br>${a.accountNumber}<br>${a.accountName}`:'No dedicated receiving account yet.'}catch(x){status.textContent=x.message}}create.onclick=async()=>{status.textContent='Creating account…';try{const d=await api('/wallet/banking/receive-account',{method:'POST',headers:headers(),body:'{}'});status.textContent=d.message;load()}catch(x){status.textContent=x.message}};load();</script>

</body></html>
