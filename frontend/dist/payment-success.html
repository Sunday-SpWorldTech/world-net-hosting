<!DOCTYPE html><html lang="en"><head>
  <link rel="preconnect" href="https://world-net-hosting-backend.onrender.com" crossorigin><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Payment Success - World Net Hosting</title><link rel="stylesheet" href="assets/css/style.css"></head><body><header class="top-nav"><div class="nav-left"><a class="logo" href="index.html"><img class="site-logo" src="images/logo.jpeg" alt="World Net Hosting logo"><span class="site-brand-name">World Net Hosting</span></a><button type="button" class="nav-toggle" aria-label="Open navigation menu" aria-expanded="false"><span class="nav-toggle-icon">☰</span><span class="nav-toggle-label">Menu</span></button><details class="nav-dropdown"><summary class="nav-item">Domains <span>⌄</span></summary><div class="dropdown-menu"><a href="domains.html">Domain Search</a><a href="dns-manager.html">DNS Manager</a><a href="domain-transfer.html">Transfer Domain</a><a href="domain-receive.html">Receive Domain</a><a href="reviews.html">Reviews</a><a href="deals.html">Deals</a><a href="security.html">Security</a><a href="terms.html">Terms and Conditions</a><a href="policy.html">Policy</a><a href="help.html">Help</a></div></details><a href="email.html" class="nav-item">Email</a><a href="hosting.html" class="nav-item">Hosting</a><a href="pricing.html" class="nav-item">Pricing</a><a href="about.html" class="nav-item">About</a><a href="contact.html" class="nav-item">Contact</a></div><div class="nav-right"><a href="signin.html" class="nav-item nav-auth-link">Joinfree</a><a href="cart.html" class="cart" aria-label="Cart" data-count="0">🛒</a></div></header><main class="section"><div class="card" style="max-width:760px;margin:auto"><h1>Payment Confirmation</h1><p class="small">We are checking your Paystack payment reference.</p><div id="payment-status" class="notice">Verifying payment...</div><p style="margin-top:18px"><a class="btn teal" href="dashboard.html">Open Dashboard</a></p></div></main><script defer src="assets/js/env.js"></script><script defer src="assets/js/app.js"></script><script>document.addEventListener('DOMContentLoaded',async()=>{const out=document.getElementById('payment-status');const ref=new URLSearchParams(location.search).get('reference');if(!ref){out.textContent='No payment reference found. Open your dashboard or contact support.';return;}try{const res=await fetch(`${API_BASE}/payments/paystack/verify/${encodeURIComponent(ref)}`);const data=await res.json();if(data?.data?.status==='success'){localStorage.removeItem('world_net_hosting_cart');localStorage.removeItem('worldnet_pending_payment');out.textContent='Payment verified successfully. Your payment has been confirmed and your account is being updated.';setTimeout(()=>{const target=sessionStorage.getItem('worldnet_payment_return')||sessionStorage.getItem('worldnet_return_to')||'dashboard.html';sessionStorage.removeItem('worldnet_payment_return');if(getToken()){location.replace(target)}else{sessionStorage.setItem('worldnet_return_to',target);location.replace('signin.html')}},1800)}else{out.textContent='Payment verification returned: '+(data?.data?.status||data?.message||'unknown');}}catch(e){out.textContent='Could not verify payment. Check backend and Paystack environment.';}})</script><script defer src="assets/js/language-switcher.js"></script></body></html>
