<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Staff Support - World Net Hosting</title><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/dashboard.css"></head><body class="dashboard-body"><main class="app-shell"><aside class="app-sidebar"><a class="app-brand" href="staff.htm"><span class="wnh-text-logo" aria-label="World Net Hosting">WNH</span><span><strong>WNH</strong><small>Staff Workspace</small></span></a><nav class="app-nav"><a class="active" href="staff.htm">Conversations</a><a href="dashboard-wallet.html">My Wallet / Withdraw</a></nav><button class="app-logout" onclick="logoutUser()">Logout</button></aside><section class="app-main"><header class="app-topbar"><div><p class="app-kicker">Customer support</p><h1>Staff Dashboard</h1></div><div id="dashboard-language-currency" data-no-translate></div></header><section id="wallet-banking-panel" class="card banking-panel"><div id="wallet-banking-content">Loading staff wallet banking tools…</div></section><section class="card"><div id="staff-messages">Loading conversations…</div></section></section></main><script src="assets/js/env.js"></script><script src="assets/js/app.js"></script><script src="assets/js/language-switcher.js"></script><script>
(async()=>{const token=localStorage.getItem('worldnet_token'),user=JSON.parse(localStorage.getItem('worldnet_user')||'{}');if(!token||user.role!=='staff'){location.href=(window.WORLDNET_CONFIG?.API_BASE_URL||'https://world-net-hosting-backend.onrender.com/api')+'/auth/github/start?role=staff&returnTo=staff.htm';return;}const API='https://world-net-hosting-backend.onrender.com/api',box=document.getElementById('staff-messages');const esc=v=>String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function load(){try{const r=await fetch(API+'/staff/messages',{headers:{Authorization:'Bearer '+token}}),rows=await r.json();if(!r.ok)throw new Error(rows.message);box.innerHTML=rows.length?rows.map(m=>`<article class="domain-item" style="display:block"><strong>${esc(m.subject||'Support request')}</strong> <span class="badge">${m.status}</span><small>${esc(m.name)} · ${esc(m.email)} · language ${esc(m.language||'en')}</small><p><b>English:</b> ${esc(m.englishMessage||m.message)}</p>${m.language!=='en'?`<p><b>Original:</b> ${esc(m.localMessage||m.message)}</p>`:''}${(m.attachments||[]).map(a=>`<a target="_blank" href="${API.replace(/\/api$/,'')}${a.url}">📎 ${esc(a.filename)}</a>`).join('')}<div>${(m.replies||[]).map(x=>`<p><b>${esc(x.repliedBy)}:</b> ${esc(x.body)}${x.localBody&&x.localBody!==x.body?`<br><small>Local: ${esc(x.localBody)}</small>`:''}</p>`).join('')}</div><form onsubmit="reply(event,'${m._id}')"><textarea name="body" required placeholder="Reply in English; translator sends the local-language version"></textarea><button class="btn">Send reply</button><select onchange="statusUpdate('${m._id}',this.value)"><option>${m.status}</option><option>open</option><option>replied</option><option>closed</option></select></form></article>`).join(''):'<p>No conversations.</p>';}catch(e){box.textContent=e.message}}window.reply=async(e,id)=>{e.preventDefault();await fetch(API+'/staff/messages/'+id+'/reply',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({body:new FormData(e.target).get('body')})});load()};window.statusUpdate=async(id,status)=>{await fetch(API+'/staff/messages/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({status})});load()};load()})();
</script></body></html>
