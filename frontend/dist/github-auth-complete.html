<!doctype html><html lang="en"><head>
  <link rel="preconnect" href="https://world-net-hosting-backend.onrender.com" crossorigin><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Completing GitHub Sign In | WNH</title><link rel="stylesheet" href="assets/css/style.css"></head><body class="auth-section"><main class="section auth-centered"><div class="card auth-card"><span class="wnh-text-logo">WNH</span><h2>Completing GitHub sign in…</h2><div id="github-auth-status" class="notice">Please wait.</div></div></main><script>const p=new URLSearchParams(location.hash.slice(1));const out=document.getElementById('github-auth-status');if(p.get('error')){out.textContent=p.get('error');setTimeout(()=>location.replace('signin.html'),2500)}else{try{const user=JSON.parse(atob(p.get('user').replace(/-/g,'+').replace(/_/g,'/')));localStorage.setItem('worldnet_token',p.get('token'));localStorage.setItem('worldnet_user',JSON.stringify(user));localStorage.setItem('worldnet_auth_method','github');localStorage.setItem('worldnet_pin_ok','yes');const nextPage=p.get('returnTo')||(user.role==='staff'?'staff.htm':'dashboard.html');sessionStorage.removeItem('worldnet_return_to');out.textContent='GitHub email verified. Sign in successful.';location.replace(nextPage)}catch(e){out.textContent='Could not complete GitHub sign in.';setTimeout(()=>location.replace('signin.html'),1800)}}</script>
  <script defer src="assets/js/env.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script defer src="assets/js/language-switcher.js"></script>
</body></html>
